<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Soccer Game</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="ui">
      <div class="header">3D Soccer Prototype</div>
      <div class="status">
        <span id="scoreboard">Home 0 - 0 Away</span>
        <span id="clock">00:00</span>
      </div>
      <div class="controls">
        Move: W/A/S/D · Shoot: Space · Sprint: Shift
      </div>
    </div>
    <div id="canvas-holder"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
